<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2D EO FEM Solver</title>
    <link rel="stylesheet" href="./styles.css?v=20260710-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Simulation workspace">
        <div class="editor-pane">
          <div class="toolbar">
            <div class="toolbar-group project-actions" aria-label="Open workspace artifacts">
              <span>Open</span>
              <button id="open-geometry-button" type="button" title="Open YAML or geometry JSON without solving">Geometry</button>
              <button id="open-mesh-button" type="button" title="Open Gmsh MSH 4.1 or mesh JSON">Mesh</button>
              <button id="open-solution-button" type="button" title="Open a saved solution JSON">Solution</button>
            </div>
            <div class="toolbar-group validation-library" aria-label="Backend validation library">
              <span>Library</span>
              <select id="validation-example-select" aria-label="Validation example"></select>
              <button id="load-validation-button" type="button">Load</button>
            </div>
            <div class="toolbar-group" aria-label="Electrostatic examples">
              <span>ES</span>
              <button id="parallel-button" type="button">Parallel plate</button>
              <button id="cylinders-button" type="button">Two cylinders</button>
              <button id="stack-button" type="button">Stack</button>
              <button id="tfln-button" type="button">TFLN</button>
              <button id="bto-button" type="button">BTO</button>
            </div>
            <div class="toolbar-group" aria-label="Electromagnetic mode examples">
              <span>EM</span>
              <button id="si-mode-button" type="button">Si</button>
              <button id="tfln-mode-button" type="button">TFLN</button>
              <button id="bto-mode-button" type="button">BTO</button>
            </div>
            <label class="mesh-input">
              nx
              <input id="mesh-nx-input" type="number" min="3" max="401" step="2" />
            </label>
            <label class="mesh-input">
              ny
              <input id="mesh-ny-input" type="number" min="3" max="401" step="2" />
            </label>
            <label class="physics-input">
              Physics
              <select id="physics-select">
                <option value="config">config</option>
                <option value="electrostatic">ES</option>
                <option value="optical_mode">EM scalar</option>
                <option value="vector_mode">EM vector</option>
              </select>
            </label>
            <button id="solve-button" type="button">Solve</button>
            <output id="status">Idle</output>
          </div>
          <input id="geometry-file-input" type="file" accept=".yaml,.yml,.json,application/json,text/yaml" hidden />
          <input id="mesh-file-input" type="file" accept=".msh,.json,application/json,text/plain" hidden />
          <input id="solution-file-input" type="file" accept=".json,application/json" hidden />
          <div class="editor-workspace">
            <nav class="model-browser" aria-label="Model builder">
              <div class="model-browser-header">Model Builder</div>
              <div class="model-root">Study 1</div>
              <button id="geometry-tree-node" class="model-node" type="button" data-view="geometry">
                <span class="model-node-icon geometry-icon">G</span>
                <span><strong>Geometry 1</strong><small id="geometry-source">not loaded</small></span>
              </button>
              <button id="mesh-tree-node" class="model-node" type="button" data-view="mesh">
                <span class="model-node-icon mesh-icon">M</span>
                <span><strong>Mesh 1</strong><small id="mesh-source">not loaded</small></span>
              </button>
              <button id="solution-tree-node" class="model-node" type="button" data-view="results">
                <span class="model-node-icon solution-icon">R</span>
                <span><strong>Results</strong><small id="solution-source">not loaded</small></span>
              </button>
              <div class="model-browser-hint">Open artifacts independently, then switch layers here.</div>
            </nav>
            <textarea id="config-editor" spellcheck="false" aria-label="Simulation YAML"></textarea>
          </div>
          <section class="log-panel" aria-label="Solver log">
            <div class="log-header">Log</div>
            <div id="log-window" class="log-window" aria-live="polite"></div>
          </section>
        </div>
        <div id="panel-resizer" class="panel-resizer" role="separator" aria-orientation="vertical"></div>
        <div class="output-pane">
          <div class="view-controls" aria-label="Plot controls">
            <label>
              View
              <select id="view-mode-select">
                <option value="geometry">Geometry</option>
                <option value="mesh">Mesh</option>
                <option value="results" selected>Results</option>
              </select>
            </label>
            <label>
              Quantity
              <select id="quantity-select"></select>
            </label>
            <label id="mode-select-label" class="mode-select-label">
              Mode
              <select id="mode-select"></select>
            </label>
            <label>
              Scale
              <select id="scale-select">
                <option value="linear">linear</option>
                <option value="symmetric">linear symmetric</option>
                <option value="log">log magnitude</option>
              </select>
            </label>
            <label class="check-control">
              <input id="mesh-toggle" type="checkbox" />
              mesh
            </label>
            <button id="reset-view-button" type="button">Reset view</button>
          </div>
          <progress id="solve-progress" class="solve-progress"></progress>
          <div class="canvas-wrap">
            <canvas id="field-canvas" width="760" height="520" aria-label="Field and mesh plot"></canvas>
            <div id="plot-tooltip" class="plot-tooltip" hidden></div>
            <div class="colorbar" aria-hidden="true">
              <canvas id="colorbar-canvas" width="24" height="220"></canvas>
              <div class="colorbar-labels">
                <span id="colorbar-max"></span>
                <span id="colorbar-mid"></span>
                <span id="colorbar-min"></span>
              </div>
            </div>
          </div>
          <div id="results" class="results" aria-live="polite"></div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js?v=20260710-7"></script>
  </body>
</html>
