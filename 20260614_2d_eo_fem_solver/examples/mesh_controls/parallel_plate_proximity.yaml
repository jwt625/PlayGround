Simulation:
  name: parallel_plate_proximity_mesh
  mesh_nx: 61
  mesh_ny: 41
  signal_electrode: signal
Domain:
  x_min: -15e-6
  x_max: 15e-6
  y_min: -8e-6
  y_max: 8e-6
Materials:
  background:
    eps_r: 3.9
Electrodes:
  signal:
    shape: rectangle
    potential: 1.0
    x_min: -6e-6
    x_max: 6e-6
    y_min: 1e-6
    y_max: 1.4e-6
  ground:
    shape: rectangle
    potential: 0.0
    x_min: -5e-6
    x_max: 5e-6
    y_min: -1.4e-6
    y_max: -1e-6
Mesh:
  name: mesh1
  dimension: 2
  sequence_type: user_controlled
  operations:
    global_size:
      type: size
      selection: entire_geometry
      h_min: 0.12e-6
      h_max: 1.2e-6
    signal_proximity:
      type: boundary_proximity
      selection: signal_boundary
      h_min: 0.12e-6
      h_max: 1.2e-6
      distance_min: 0.15e-6
      distance_max: 2.5e-6
      sampling: 120
    ground_proximity:
      type: boundary_proximity
      selection: ground_boundary
      h_min: 0.12e-6
      h_max: 1.2e-6
      distance_min: 0.15e-6
      distance_max: 2.5e-6
      sampling: 120
    free_triangular:
      type: free_triangular
      selection: all_domains
      algorithm: delaunay
Outputs:
  reference: parallel_plate
  plate_width: 10e-6
  plate_gap: 2e-6
