<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IEEE P802.3dj Presentation Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>IEEE P802.3dj Presentations</h1>
          <p>Cached meeting materials, metadata, and extracted text.</p>
        </div>
        <div class="topbar-actions">
          <a
            class="icon-link"
            href="https://github.com/jwt625/ieee802_3dj_browser"
            target="_blank"
            rel="noreferrer"
            aria-label="Open GitHub repository"
            title="GitHub repository"
          >
            <svg aria-hidden="true" viewBox="0 0 16 16" width="18" height="18">
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38v-1.49c-2.23.48-2.7-.95-2.7-.95-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.22.82 1.22.82.72 1.21 1.87.86 2.33.66.07-.52.28-.86.5-1.06-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.6 7.6 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.2c0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
          </a>
          <div class="stats" id="stats">Loading</div>
        </div>
      </header>

      <section class="controls" aria-label="Search and sorting controls">
        <input id="search" type="search" placeholder="Search title, people, affiliation, filename, extracted text" />
        <select id="sortBy" aria-label="Sort presentations">
          <option value="date-desc">Date, newest first</option>
          <option value="date-asc">Date, oldest first</option>
          <option value="meeting-desc">Meeting, newest first</option>
          <option value="meeting-asc">Meeting, oldest first</option>
          <option value="title-asc">Title A-Z</option>
          <option value="presenter-asc">Presenter A-Z</option>
          <option value="size-desc">File size, largest first</option>
        </select>
        <label class="check"><input id="textSearch" type="checkbox" /> Include extracted text</label>
      </section>

      <section class="layout">
        <aside class="months" aria-label="Meeting month filters">
          <div class="panel-head">
            <span>Months</span>
            <button id="clearMonths" type="button">All</button>
          </div>
          <div id="monthList" class="month-list"></div>
        </aside>

        <aside class="presentations" aria-label="Presentations">
          <div class="panel-head">
            <span>Presentations</span>
            <span id="resultCount"></span>
          </div>
          <div id="presentationList" class="presentation-list"></div>
        </aside>

        <section class="detail" aria-live="polite">
          <div class="detail-head">
            <div>
              <div class="code" id="detailCode"></div>
              <h2 id="detailTitle">Select a presentation</h2>
              <p id="detailMeta"></p>
            </div>
            <nav class="links" id="detailLinks"></nav>
          </div>

          <div class="tabs" role="tablist">
            <button class="tab active" id="overviewTab" type="button">Overview</button>
            <button class="tab" id="markdownTab" type="button">Extracted Text</button>
            <button class="tab" id="rawTab" type="button">Metadata</button>
          </div>

          <article class="overview" id="overviewView"></article>
          <article class="markdown hidden" id="markdownView"></article>
          <article class="row-view hidden" id="rawView"></article>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
