services:
  postgres:
    image: postgres:16-alpine
    container_name: kizuna-postgres
    environment:
      POSTGRES_DB: kizuna
      POSTGRES_USER: kizuna
      POSTGRES_PASSWORD: kizuna
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kizuna -d kizuna"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
